<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Page Not Found — The Meridian Society</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to The Meridian Society's main site." />
  <meta name="robots" content="noindex, follow" />

  <link rel="canonical" href="https://meridiansociety.ca/" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://meridiansociety.ca/" />
  <meta property="og:title"       content="The Meridian Society | Ottawa Student Speaker Forum" />
  <meta property="og:description" content="A student-run speaker forum in Ottawa. Free events, open conversations, and a community of curious minds." />
  <meta property="og:image"       content="https://meridiansociety.ca/assets/og-image.png" />
  <meta property="og:site_name"   content="The Meridian Society" />

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicons/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png" />
  <link rel="shortcut icon" href="/assets/favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#080808" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: linear-gradient(135deg, #0b0e17 0%, #1a1f2e 100%);
      color: #e5e5e5;
      font-family: 'Cormorant Garamond', serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .container-404 {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c9a84c 0%, #a89038 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 1rem;
      line-height: 1;
    }

    .error-title {
      font-size: 2.5rem;
      font-weight: 400;
      margin-bottom: 1rem;
      letter-spacing: 0.05em;
    }

    .error-description {
      font-size: 1.1rem;
      color: #b0b0b0;
      margin-bottom: 2rem;
      line-height: 1.6;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 300;
    }

    .error-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      padding: 0.75rem 2rem;
      font-size: 1rem;
      border: 2px solid #c9a84c;
      background: transparent;
      color: #c9a84c;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 500;
      letter-spacing: 0.05em;
    }

    .btn:hover {
      background: #c9a84c;
      color: #0b0e17;
    }

    .btn-primary {
      background: #c9a84c;
      color: #0b0e17;
    }

    .btn-primary:hover {
      background: #a89038;
      border-color: #a89038;
    }

    .error-footer {
      margin-top: 3rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(201, 168, 76, 0.2);
      font-size: 0.9rem;
      color: #808080;
    }

    @media (max-width: 768px) {
      .error-code {
        font-size: 5rem;
      }

      .error-title {
        font-size: 1.8rem;
      }

      .error-description {
        font-size: 1rem;
      }

      .error-actions {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container-404">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-description">
      The page you're looking for has drifted beyond our meridian. Let's get you back on course.
    </p>
    <div class="error-actions">
      <a href="/" class="btn btn-primary">Return Home</a>
      <a href="/team.html" class="btn">Meet the Team</a>
    </div>
    <div class="error-footer">
      <p>If you believe this is an error, please <a href="mailto:meridiansocietycanada@gmail.com" style="color: #c9a84c; text-decoration: none;">contact us</a>.</p>
    </div>
  </div>
</body>
</html>
