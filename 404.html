<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Page Not Found — The Meridian Society</title>
  <meta name="description" content="The page you're looking for doesn't exist. Return to The Meridian Society's main site." />
  <meta name="robots" content="noindex, follow" />

  <link rel="canonical" href="https://meridiansociety.ca/" />

  <!-- Open Graph -->
  <meta property="og:type"        content="website" />
  <meta property="og:url"         content="https://meridiansociety.ca/" />
  <meta property="og:title"       content="The Meridian Society | Ottawa Student Speaker Forum" />
  <meta property="og:description" content="A student-run speaker forum in Ottawa. Free events, open conversations, and a community of curious minds." />
  <meta property="og:image"       content="https://meridiansociety.ca/assets/og-image.png" />
  <meta property="og:site_name"   content="The Meridian Society" />

  <!-- Favicons -->
  <link rel="icon" type="image/svg+xml" href="/assets/favicons/favicon.svg" />
  <link rel="icon" type="image/png" sizes="48x48" href="/assets/favicons/favicon-48x48.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicons/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicons/favicon-16x16.png" />
  <link rel="shortcut icon" href="/assets/favicons/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicons/apple-touch-icon.png" />
  <link rel="manifest" href="/site.webmanifest" />
  <meta name="theme-color" content="#080808" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Barlow+Condensed:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --black:        #080808;
      --gold:         #c9a84c;
      --gold-light:   #e2c47a;
      --cream:        #f5f0e8;
      --cream-45:     rgba(245,240,232,0.72);
      --serif:        'Cormorant Garamond', Georgia, serif;
      --sans:         'Barlow Condensed', 'Arial Narrow', Arial, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background-color: var(--black);
      color: var(--cream);
      font-family: var(--serif);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .container-404 {
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }

    .error-code {
      font-size: 8rem;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 1rem;
      line-height: 1;
      letter-spacing: -0.02em;
    }

    .error-title {
      font-size: 2.5rem;
      font-weight: 400;
      margin-bottom: 1.5rem;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      font-family: var(--sans);
    }

    .error-description {
      font-size: 1.2rem;
      color: var(--cream-45);
      margin-bottom: 2.5rem;
      line-height: 1.6;
      font-family: var(--serif);
      font-style: italic;
    }

    .btn {
      display: inline-block;
      padding: 12px 32px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      text-decoration: none;
      font-family: var(--sans);
      background: var(--gold);
      color: var(--black);
      transition: all 0.3s ease;
      border: 1px solid var(--gold);
    }

    .btn:hover {
      background: transparent;
      color: var(--gold);
    }

    .error-footer {
      margin-top: 4rem;
      padding-top: 2rem;
      border-top: 1px solid rgba(201, 168, 76, 0.15);
      font-size: 11px;
      font-family: var(--sans);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(245, 240, 232, 0.4);
    }

    @media (max-width: 768px) {
      .error-code { font-size: 6rem; }
      .error-title { font-size: 1.8rem; }
      .error-description { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
  <div class="container-404">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>
    <p class="error-description">
      The page you're looking for has drifted beyond our meridian.
    </p>
    <a href="/" class="btn">Return Home</a>
    <div class="error-footer">
      <p>The Meridian Society — Ottawa Student Speaker Forum</p>
    </div>
  </div>
</body>
</html>
