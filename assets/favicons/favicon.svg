<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <radialGradient id="bgGrad" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a1f2e"/>
      <stop offset="100%" stop-color="#0b0e17"/>
    </radialGradient>
    <radialGradient id="globeGrad" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#2a3148"/>
      <stop offset="100%" stop-color="#111827"/>
    </radialGradient>
    <clipPath id="circleClip">
      <circle cx="16" cy="16" r="12.5"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15.5" fill="url(#bgGrad)"/>

  <!-- Globe body -->
  <circle cx="16" cy="16" r="12.5" fill="url(#globeGrad)"/>

  <!-- Globe outline -->
  <circle cx="16" cy="16" r="12.5" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.9"/>

  <!-- Equator line -->
  <line x1="3.5" y1="16" x2="28.5" y2="16" stroke="#c9a84c" stroke-width="0.5" stroke-dasharray="none" opacity="0.5" clip-path="url(#circleClip)"/>

  <!-- Primary meridian arc (center vertical) -->
  <ellipse cx="16" cy="16" rx="0.01" ry="12.5" fill="none" stroke="#c9a84c" stroke-width="1.1" opacity="0.9" filter="url(#glow)" clip-path="url(#circleClip)"/>

  <!-- Left meridian arc -->
  <ellipse cx="16" cy="16" rx="6" ry="12.5" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.45" clip-path="url(#circleClip)"/>

  <!-- Right meridian arc -->
  <ellipse cx="16" cy="16" rx="10.5" ry="12.5" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.3" clip-path="url(#circleClip)"/>

  <!-- Upper latitude arc -->
  <ellipse cx="16" cy="10.5" rx="9.5" ry="3" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.35" clip-path="url(#circleClip)"/>

  <!-- Lower latitude arc -->
  <ellipse cx="16" cy="21.5" rx="9.5" ry="3" fill="none" stroke="#c9a84c" stroke-width="0.5" opacity="0.35" clip-path="url(#circleClip)"/>

  <!-- Center dot / pole accent -->
  <circle cx="16" cy="16" r="1.1" fill="#c9a84c" opacity="0.85"/>

  <!-- Outer ring subtle border -->
  <circle cx="16" cy="16" r="15.3" fill="none" stroke="#c9a84c" stroke-width="0.3" opacity="0.25"/>
</svg>
